[pytest]
# test_hittest / test_resize_freedom / test_wordclick 不是 pytest 用例，是独立
# 脚本套件（import 即创建真窗口跑断言、跑完 sys.exit——被 pytest 收集会直接
# INTERNALERROR: SystemExit）。它们要用 venv 的 python 单独跑：
#   venv\Scripts\python test_hittest.py
#   venv\Scripts\python test_resize_freedom.py
#   venv\Scripts\python test_wordclick.py
addopts = --ignore=test_hittest.py --ignore=test_resize_freedom.py --ignore=test_wordclick.py
