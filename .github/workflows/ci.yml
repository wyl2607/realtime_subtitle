name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pipeline-helpers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          # translator_queue imports requests+torch at module load; use CPU torch only
          pip install "numpy>=1.24,<3" "pytest>=8" "requests>=2.28,<3"
          pip install --index-url https://download.pytorch.org/whl/cpu "torch"
      - name: Run non-GUI unit tests
        run: python -m pytest test_pipeline_helpers.py -q